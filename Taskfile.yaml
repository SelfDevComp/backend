version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  up:
    desc: up (traefik, auth, redis, postgres)
    cmds:
      - docker compose up -d

  down:
    desc: down (traefik, auth, redis, postgres)
    cmds: 
      - docker compose down

  up:backend:
    desc: up backend
    cmds: 
      - docker compose -f docker-compose.backend.yaml up -d

  down:backend:
    desc: down backend
    cmds:
      - docker compose -f docker-compose.backend.yaml down

  lint:
    desc: formatting project
    cmds:
      - go fmt ./...
      - golangci-lint run --fix